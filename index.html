<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Akshay's Snake</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4ecca3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Akshay's Snake" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }

    h1 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #4ecca3;
      margin-bottom: 12px;
    }

    .scoreboard {
      display: flex;
      gap: 28px;
      margin-bottom: 12px;
      align-items: center;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label {
      font-size: 10px;
      letter-spacing: 3px;
      color: #a0aec0;
      text-transform: uppercase;
    }

    .score-box .value {
      font-size: 24px;
      font-weight: 600;
      color: #4ecca3;
    }

    .level-badge {
      background: #e94560;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .wrapper {
      position: relative;
    }

    canvas {
      border-radius: 12px;
      border: 2px solid #0f3460;
      background: #16213e;
      display: block;
      max-width: 100vw;
      max-height: 60vh;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(22, 33, 62, 0.92);
      border-radius: 12px;
    }

    .overlay h2 {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #e94560;
    }

    .overlay .final-score {
      font-size: 52px;
      font-weight: 700;
      color: #4ecca3;
      line-height: 1;
    }

    .overlay p {
      color: #a0aec0;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .overlay .level-info {
      color: #e94560;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .play-btn {
      margin-top: 8px;
      padding: 14px 36px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .play-btn:active { background: #38b28d; }

    .controls {
      margin-top: 12px;
      color: #a0aec0;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
    }

    .level-banner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      border-radius: 12px;
    }

    .level-banner span {
      background: rgba(233, 69, 96, 0.9);
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 12px 28px;
      border-radius: 10px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>Akshay's Snake</h1>

  <div class="scoreboard">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="level-badge" id="levelBadge">Level 1</div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>

  <div class="wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>

    <div class="level-banner" id="levelBanner">
      <span id="levelBannerText"></span>
    </div>

    <div class="overlay" id="overlay">
      <h2>AKSHAY'S SNAKE</h2>
      <p>Swipe or use arrow keys</p>
      <button class="play-btn" onclick="startGame()">Play</button>
    </div>
  </div>

  <div class="controls" id="controlsHint">Swipe to move &nbsp;|&nbsp; P to pause</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const levelBadge = document.getElementById('levelBadge');
    const levelBanner = document.getElementById('levelBanner');
    const levelBannerText = document.getElementById('levelBannerText');

    // Responsive canvas
    function resizeCanvas() {
      const maxSize = Math.min(window.innerWidth - 16, window.innerHeight * 0.58, 400);
      const size = Math.floor(maxSize / 20) * 20;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    // Level config: [minScore, speed(ms), numObstacles, label]
    const LEVELS = [
      { min: 0,   speed: 150, obstacles: 0, label: 'Level 1' },
      { min: 50,  speed: 125, obstacles: 0, label: 'Level 2' },
      { min: 100, speed: 105, obstacles: 2, label: 'Level 3' },
      { min: 160, speed: 88,  obstacles: 4, label: 'Level 4' },
      { min: 230, speed: 72,  obstacles: 6, label: 'Level 5' },
      { min: 310, speed: 58,  obstacles: 8, label: 'Level 6' },
      { min: 400, speed: 46,  obstacles: 10, label: 'Level 7' },
    ];

    let snake, dir, nextDir, food, score, best, loop, paused, running;
    let obstacles = [];
    let currentLevel = 0;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function getLevelConfig(s) {
      let cfg = LEVELS[0];
      for (const l of LEVELS) {
        if (s >= l.min) cfg = l;
      }
      return cfg;
    }

    function getLevelIndex(s) {
      let idx = 0;
      for (let i = 0; i < LEVELS.length; i++) {
        if (s >= LEVELS[i].min) idx = i;
      }
      return idx;
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        obstacles.some(o => o.x === pos.x && o.y === pos.y)
      );
      food = pos;
    }

    function generateObstacles(count) {
      const obs = [];
      const center = { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) };
      let attempts = 0;
      while (obs.length < count && attempts < 500) {
        attempts++;
        const x = Math.floor(Math.random() * (COLS - 4)) + 2;
        const y = Math.floor(Math.random() * (ROWS - 4)) + 2;
        const tooClose = snake.some(s => Math.abs(s.x - x) < 3 && Math.abs(s.y - y) < 3);
        const duplicate = obs.some(o => o.x === x && o.y === y);
        if (!tooClose && !duplicate) obs.push({ x, y });
      }
      return obs;
    }

    function showLevelBanner(label) {
      levelBannerText.textContent = label;
      levelBanner.style.display = 'flex';
      setTimeout(() => { levelBanner.style.display = 'none'; }, 1200);
    }

    function startGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      paused = false;
      running = true;
      currentLevel = 0;
      obstacles = [];
      scoreEl.textContent = 0;
      levelBadge.textContent = 'Level 1';
      overlay.style.display = 'none';
      placeFood();
      clearInterval(loop);
      loop = setInterval(tick, LEVELS[0].speed);
    }

    function tick() {
      if (paused) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
      if (obstacles.some(o => o.x === head.x && o.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }

        const newLevelIdx = getLevelIndex(score);
        if (newLevelIdx > currentLevel) {
          currentLevel = newLevelIdx;
          const cfg = LEVELS[currentLevel];
          levelBadge.textContent = cfg.label;
          obstacles = generateObstacles(cfg.obstacles);
          showLevelBanner(cfg.label + '!');
          clearInterval(loop);
          loop = setInterval(tick, cfg.speed);
        }

        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1d2d50';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.beginPath();
          ctx.arc(x * GRID + GRID / 2, y * GRID + GRID / 2, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Obstacles
      obstacles.forEach(o => {
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.roundRect(o.x * GRID + 2, o.y * GRID + 2, GRID - 4, GRID - 4, 3);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(o.x * GRID + 4, o.y * GRID + 4, GRID - 8, 3);
      });

      // Food
      const fx = food.x * GRID + GRID / 2;
      const fy = food.y * GRID + GRID / 2;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx, fy, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(fx - 2, fy - 2, 3, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const x = seg.x * GRID + 1;
        const y = seg.y * GRID + 1;
        const size = GRID - 2;
        const alpha = 1 - (i / snake.length) * 0.6;
        ctx.fillStyle = i === 0 ? '#4ecca3' : `rgba(78, 204, 163, ${alpha})`;
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, i === 0 ? 6 : 4);
        ctx.fill();

        if (i === 0) {
          ctx.fillStyle = '#1a1a2e';
          const ex = seg.x * GRID + GRID / 2;
          const ey = seg.y * GRID + GRID / 2;
          const off = 4;
          if (dir.x === 1) {
            ctx.beginPath(); ctx.arc(ex + 3, ey - off, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex + 3, ey + off, 2, 0, Math.PI * 2); ctx.fill();
          } else if (dir.x === -1) {
            ctx.beginPath(); ctx.arc(ex - 3, ey - off, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex - 3, ey + off, 2, 0, Math.PI * 2); ctx.fill();
          } else if (dir.y === -1) {
            ctx.beginPath(); ctx.arc(ex - off, ey - 3, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex + off, ey - 3, 2, 0, Math.PI * 2); ctx.fill();
          } else {
            ctx.beginPath(); ctx.arc(ex - off, ey + 3, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex + off, ey + 3, 2, 0, Math.PI * 2); ctx.fill();
          }
        }
      });
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      const cfg = getLevelConfig(score);
      overlay.innerHTML = `
        <h2>GAME OVER</h2>
        <div class="final-score">${score}</div>
        <div class="level-info">Reached ${cfg.label}</div>
        <p>Best: ${best}</p>
        <button class="play-btn" onclick="startGame()">Play Again</button>
      `;
      overlay.style.display = 'flex';
    }

    // Keyboard controls
    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
        case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y: 1 };  break;
        case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  break;
        case 'p': case 'P': if (running) paused = !paused; break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });

    // Touch / swipe controls
    let touchStartX = null;
    let touchStartY = null;

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
        else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
      } else {
        if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
        else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
      }

      touchStartX = null;
      touchStartY = null;
    }, { passive: false });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
